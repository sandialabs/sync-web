name: Workbench Service

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: "workbench"
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to Github registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install workbench dependencies
        working-directory: ./services/workbench
        run: npm ci
      - name: Run workbench tests
        working-directory: ./services/workbench
        run: npm test -- --watchAll=false
      - name: Build versioned Docker image
        run: |
          version=$( cat ./services/workbench/version.txt )
          docker build ./services/workbench --tag ghcr.io/${{ github.repository }}/workbench:$version
      - name: Push versioned Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          version=$( cat ./services/workbench/version.txt )
          docker push ghcr.io/${{ github.repository }}/workbench:$version
      - name: Retag and push latest Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          version=$( cat ./services/workbench/version.txt )
          docker tag ghcr.io/${{ github.repository }}/workbench:$version \
                     ghcr.io/${{ github.repository }}/workbench:latest 
          docker push ghcr.io/${{ github.repository }}/workbench:latest
