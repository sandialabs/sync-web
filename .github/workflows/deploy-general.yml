name: Deploy General

on:
  push:
    branches: ["**"]
    paths: ["deploy/**", "records/**", "journal/**"]
  pull_request:
    branches: ["main"]
    paths: ["deploy/**", "records/**", "journal/**"]

concurrency:
  group: "deploy-general-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to Github registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Resolve version
        id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - name: Build journal-sdk image
        uses: docker/build-push-action@v6
        with:
          context: journal
          platforms: linux/amd64
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}/journal-sdk:ci
          cache-from: type=gha,scope=journal-sdk-docker
          cache-to: type=gha,mode=max,scope=journal-sdk-docker
      - name: Build general Docker image (PR/non-main validation)
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/compose/general/Dockerfile
          build-args: |
            JOURNAL_SDK_IMAGE=ghcr.io/${{ github.repository }}/journal-sdk:ci
          platforms: linux/amd64
          push: false
          tags: ghcr.io/${{ github.repository }}/general:${{ steps.version.outputs.value }}
      - name: Build and push multi-arch general Docker images
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/compose/general/Dockerfile
          build-args: |
            JOURNAL_SDK_IMAGE=ghcr.io/${{ github.repository }}/journal-sdk:latest
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/general:${{ steps.version.outputs.value }}
            ghcr.io/${{ github.repository }}/general:latest

  compose-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install smbclient
        run: |
          sudo apt-get update
          sudo apt-get install -y smbclient
      - name: Run compose smoke test
        run: |
          SECRET=password \
          PORT=8192 \
          SMB_PORT=1445 \
          tests/api/local-compose.sh smoke
