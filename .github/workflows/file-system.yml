name: File System Service

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: "file-system"
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to Github registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Run .NET contract tests
        working-directory: ./services/file-system
        run: dotnet test tests/FileSystem.Server.Tests/FileSystem.Server.Tests.csproj

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve version
        id: version
        run: |
          echo "value=$(cat ./services/file-system/version.txt)" >> "$GITHUB_OUTPUT"

      - name: Build Docker image (PR/non-main validation)
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./services/file-system
          platforms: linux/amd64
          push: false
          tags: ghcr.io/${{ github.repository }}/file-system:${{ steps.version.outputs.value }}

      - name: Build and push multi-arch Docker images
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./services/file-system
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/file-system:${{ steps.version.outputs.value }}
            ghcr.io/${{ github.repository }}/file-system:latest
