name: Identity Provider Service

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths: ["services/identity-provider/**", "VERSION"]
  pull_request:
    branches: ["main"]
    paths: ["services/identity-provider/**"]

concurrency:
  group: "services-identity-provider-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to Github registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            service:
              - 'services/identity-provider/**'
            version:
              - 'VERSION'
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image (PR/non-main validation)
        if: github.ref != 'refs/heads/main' && steps.filter.outputs.service == 'true'
        uses: docker/build-push-action@v6
        with:
          context: services/identity-provider
          platforms: linux/amd64
          push: false
          tags: ghcr.io/${{ github.repository }}/identity-provider:latest
      - name: Build and push multi-arch Docker images
        if: github.ref == 'refs/heads/main' && steps.filter.outputs.service == 'true'
        uses: docker/build-push-action@v6
        with:
          context: services/identity-provider
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}/identity-provider:latest
      - name: Tag version
        if: github.ref == 'refs/heads/main' && steps.filter.outputs.version == 'true'
        run: |
          VERSION="$(cat VERSION)"
          TAG="ghcr.io/${{ github.repository }}/identity-provider:$VERSION"
          docker buildx imagetools create -t "$TAG" "ghcr.io/${{ github.repository }}/identity-provider:latest"
