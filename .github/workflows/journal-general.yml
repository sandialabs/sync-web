name: Journal & Compose

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths: ["journal/**", "records/**", "deploy/**"]
  pull_request:
    branches: ["main"]
    paths: ["journal/**", "records/**", "deploy/**"]

concurrency:
  group: "journal-compose-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      journal: ${{ steps.filter.outputs.journal }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            journal:
              - 'journal/**'

  test-journal:
    needs: changes
    if: needs.changes.outputs.journal == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y llvm-dev libclang-dev clang
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: journal
      - name: Build
        working-directory: journal
        run: cargo build
      - name: Test
        working-directory: journal
        run: cargo test

  publish-docs:
    needs: test-journal
    if: github.ref == 'refs/heads/main' && needs.test-journal.result == 'success'
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: journal
      - uses: actions/configure-pages@v5
      - name: Build docs
        working-directory: journal
        run: cargo doc --no-deps
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './journal/target/doc/'
      - uses: actions/deploy-pages@v4

  build-journal-sdk:
    needs: [changes, test-journal]
    if: needs.changes.outputs.journal == 'true' && needs.test-journal.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to Github registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build journal-sdk (PR/non-main validation)
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: journal
          target: runtime
          platforms: linux/amd64
          push: false
          tags: ghcr.io/${{ github.repository }}/journal-sdk:latest
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/journal-sdk:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/journal-sdk:cache,mode=max
      - name: Build and push journal-sdk (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: journal
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}/journal-sdk:latest
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/journal-sdk:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/journal-sdk:cache,mode=max

  compose-smoke:
    needs: [changes, test-journal, build-journal-sdk]
    if: always() && !cancelled() && !failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install smbclient
        run: sudo apt-get update && sudo apt-get install -y smbclient
      - name: Run compose smoke test
        run: |
          SECRET=password \
          PORT=8192 \
          SMB_PORT=1445 \
          tests/api/local-compose.sh smoke
