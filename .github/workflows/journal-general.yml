name: Journal & General

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths: ["journal/**", "records/**", "deploy/**"]
  pull_request:
    branches: ["main"]
    paths: ["journal/**", "records/**", "deploy/**"]

concurrency:
  group: "journal-general-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      journal: ${{ steps.filter.outputs.journal }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            journal:
              - 'journal/**'

  test-journal:
    needs: changes
    if: needs.changes.outputs.journal == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y llvm-dev libclang-dev clang
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: journal
      - name: Build
        working-directory: journal
        run: cargo build
      - name: Test
        working-directory: journal
        run: cargo test

  publish-docs:
    needs: test-journal
    if: github.ref == 'refs/heads/main' && needs.test-journal.result == 'success'
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: journal
      - uses: actions/configure-pages@v5
      - name: Build docs
        working-directory: journal
        run: cargo doc --no-deps
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './journal/target/doc/'
      - uses: actions/deploy-pages@v4

  build-journal-sdk:
    needs: [changes, test-journal]
    if: needs.changes.outputs.journal == 'true' && needs.test-journal.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Login to Github registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build and push journal-sdk (PR/non-main)
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: journal
          target: runtime
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}/journal-sdk:sha-${{ github.sha }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=journal-sdk-docker
          cache-to: type=gha,mode=max,scope=journal-sdk-docker
      - name: Build and push journal-sdk (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: journal
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/journal-sdk:sha-${{ github.sha }}
            ghcr.io/${{ github.repository }}/journal-sdk:latest
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=journal-sdk-docker
          cache-to: type=gha,mode=max,scope=journal-sdk-docker

  build-general:
    needs: [changes, build-journal-sdk]
    if: always() && !cancelled() && !failure()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to Github registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Resolve version
        id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - name: Resolve journal-sdk image tag
        id: sdk-tag
        run: |
          if [ "${{ needs.build-journal-sdk.result }}" = "success" ]; then
            echo "value=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Build general image (PR/non-main)
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/compose/general/Dockerfile
          build-args: JOURNAL_SDK_IMAGE=ghcr.io/${{ github.repository }}/journal-sdk:${{ steps.sdk-tag.outputs.value }}
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=general-docker
          cache-to: type=gha,mode=max,scope=general-docker
      - name: Build and push multi-arch general image (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/compose/general/Dockerfile
          build-args: JOURNAL_SDK_IMAGE=ghcr.io/${{ github.repository }}/journal-sdk:${{ steps.sdk-tag.outputs.value }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/general:${{ steps.version.outputs.value }}
            ghcr.io/${{ github.repository }}/general:latest
          cache-from: type=gha,scope=general-docker
          cache-to: type=gha,mode=max,scope=general-docker

  compose-smoke:
    needs: build-general
    if: always() && needs.build-general.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install smbclient
        run: sudo apt-get update && sudo apt-get install -y smbclient
      - name: Run compose smoke test
        run: |
          SECRET=password \
          PORT=8192 \
          SMB_PORT=1445 \
          tests/api/local-compose.sh smoke
