name: Journal

on:
  push:
    branches: ["**"]
    paths: ["journal/**"]
  pull_request:
    branches: ["main"]
    paths: ["journal/**"]

concurrency:
  group: "journal-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y llvm-dev libclang-dev clang
      - name: Install rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: journal
      - name: Build project
        working-directory: journal
        run: cargo build
      - name: Test project
        working-directory: journal
        run: cargo test
      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
      - name: Create documents
        if: github.ref == 'refs/heads/main'
        working-directory: journal
        run: cargo doc --no-deps
      - name: Upload documents artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './journal/target/doc/'
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Login to Github registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve package version
        id: version
        working-directory: journal
        run: echo "value=$(cargo pkgid | cut -d '@' -f 2)" >> "$GITHUB_OUTPUT"
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image (PR/non-main validation)
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: journal
          platforms: linux/amd64
          push: false
          load: false
          tags: ghcr.io/${{ github.repository }}/journal-sdk:ci
          cache-from: type=gha,scope=journal-sdk-docker
          cache-to: type=gha,mode=max,scope=journal-sdk-docker
      - name: Build and push multi-arch Docker images
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: journal
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/journal-sdk:latest
            ghcr.io/${{ github.repository }}/journal-sdk:${{ steps.version.outputs.value }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=journal-sdk-docker
          cache-to: type=gha,mode=max,scope=journal-sdk-docker
