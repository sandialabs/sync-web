name: General Journal

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: "general"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to Github registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Resolve version
        id: version
        run: |
          echo "value=$(cat ./compose/general/version.txt)" >> "$GITHUB_OUTPUT"
      - name: Build Docker image (PR/non-main validation)
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./compose/general
          platforms: linux/amd64
          push: false
          tags: ghcr.io/${{ github.repository }}/general:${{ steps.version.outputs.value }}
      - name: Build and push multi-arch Docker images
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./compose/general
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/general:${{ steps.version.outputs.value }}
            ghcr.io/${{ github.repository }}/general:latest

  compose-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install smbclient
        run: |
          sudo apt-get update
          sudo apt-get install -y smbclient

      - name: Run compose smoke with optional file-system service
        run: |
          SECRET=password \
          PORT=8192 \
          SMB_PORT=1445 \
          ./tests/local-compose.sh smoke
