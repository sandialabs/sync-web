name: Release

on:
  push:
    branches: ["main"]
    paths: ["VERSION"]

jobs:
  retag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Github registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Resolve version
        id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - name: Retag all images to new version
        env:
          VERSION: ${{ steps.version.outputs.value }}
          REPO: ghcr.io/${{ github.repository }}
        run: |
          for SERVICE in gateway explorer workbench file-system router identity-provider journal-sdk; do
            TAG="$REPO/$SERVICE:$VERSION"
            if docker buildx imagetools inspect "$TAG" > /dev/null 2>&1; then
              echo "$SERVICE:$VERSION already exists, skipping"
            else
              echo "Tagging $SERVICE:latest -> $VERSION"
              docker buildx imagetools create -t "$TAG" "$REPO/$SERVICE:latest"
            fi
          done
