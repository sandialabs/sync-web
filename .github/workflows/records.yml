name: Records

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths: ["records/**", "journal/**", "deploy/compose/general/**", ".github/workflows/records.yml"]
  pull_request:
    branches: ["main"]
    paths: ["records/**", "journal/**", "deploy/compose/general/**", ".github/workflows/records.yml"]

concurrency:
  group: "records-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'records/**'
              - 'journal/**'

  test:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y llvm-dev libclang-dev clang
      - name: Install rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: journal
      - name: Build journal binary
        working-directory: journal
        run: cargo build --release
      - name: Run records tests
        run: records/tests/test.sh journal/target/release/journal-sdk
