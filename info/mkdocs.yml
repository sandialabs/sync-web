site_name: Synchronic Web

theme:
  name: material
  logo: images/logo.png
  favicon: images/favicon.ico
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - toc.follow
    - toc.integrate
    - content.code.copy
    - content.tooltips
    - content.tabs.link

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - attr_list
  - pymdownx.snippets:
      auto_append:
        - docs/snippets/abbreviations.md
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
  - md_in_html
  - attr_list
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - git-revision-date-localized
  - search

nav:
  - Overview: index.md
  - Usage: usage.md
  - Operation: operation.md
  - Development: development.md
  - Research: research.md
  - Glossary: glossary.md
