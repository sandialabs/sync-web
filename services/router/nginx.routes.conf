location /interface {
    proxy_pass http://journal/interface;
}

location = /gateway {
    return 301 /gateway/;
}

location /gateway/ {
    proxy_pass http://gateway/;
}

location /api/ {
    proxy_pass http://gateway;
}

location = /docs {
    proxy_pass http://gateway/docs;
}

location = /api/v1/docs {
    proxy_pass http://gateway/api/v1/docs;
}

location = /healthz {
    proxy_pass http://gateway/healthz;
}

location = /readyz {
    proxy_pass http://gateway/readyz;
}

location /explorer {
    proxy_pass http://explorer/;
}

location /workbench {
    proxy_pass http://workbench/;
}
