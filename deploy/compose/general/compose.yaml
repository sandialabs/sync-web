networks:
  sync-net:
    name: ${COMPOSE_PROJECT_NAME:-sync}-net

services:
  journal:
    image: ghcr.io/sandialabs/sync-web/journal-sdk:${SYNC_WEB_VERSION:-1.3.1}
    container_name: ${COMPOSE_PROJECT_NAME:-sync}-journal
    working_dir: /srv
    entrypoint: ["/bin/sh", "/srv/run.sh"]
    networks:
      - sync-net
    environment:
      SECRET: ${SECRET:-}
      PERIOD: ${PERIOD:-2}
      WINDOW: ${WINDOW:-1024}
      RUST_LOG: ${RUST_LOG:-INFO}
      JOURNAL_UPDATE: ${JOURNAL_UPDATE:-}
      INTERFACE_ADMINS: ${INTERFACE_ADMINS:-admin}
      LISP_DIR: /srv/lisp
    volumes:
      - database:/srv/database
      - ../../../records/lisp:/srv/lisp:ro,Z
      - ./run.sh:/srv/run.sh:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  explorer:
    image: ghcr.io/sandialabs/sync-web/explorer:${SYNC_WEB_VERSION:-1.3.1}
    container_name: ${COMPOSE_PROJECT_NAME:-sync}-explorer
    networks:
      - sync-net
    environment:
      SYNC_EXPLORER_ENDPOINT: /api/v1
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  workbench:
    image: ghcr.io/sandialabs/sync-web/workbench:${SYNC_WEB_VERSION:-1.3.1}
    container_name: ${COMPOSE_PROJECT_NAME:-sync}-workbench
    networks:
      - sync-net
    environment:
      SYNC_WORKBENCH_ENDPOINT: /interface
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  gateway:
    image: ghcr.io/sandialabs/sync-web/gateway:${SYNC_WEB_VERSION:-1.3.1}
    container_name: ${COMPOSE_PROJECT_NAME:-sync}-gateway
    networks:
      - sync-net
    depends_on:
      - journal
    environment:
      HOST: 0.0.0.0
      PORT: 80
      JOURNAL_ENDPOINT: http://journal/interface
      ROOT_ENDPOINT: http://journal/interface
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-30000}
      ALLOW_ADMIN_ROUTES: "1"
      JOURNAL_SECRET: ${SECRET:-}
      KRATOS_PUBLIC_URL: http://identity-provider:4433
      # Peer bridges should target the gateway interface proxy, not /interface directly:
      # bridge! name=<peer> info-local.interface=http://<peer-gateway>/api/v1/journal/interface
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  identity-provider:
    image: ghcr.io/sandialabs/sync-web/identity-provider:${SYNC_WEB_VERSION:-1.3.1}
    container_name: ${COMPOSE_PROJECT_NAME:-sync}-identity-provider
    networks:
      - sync-net
    volumes:
      - identity-provider-data:/var/lib/kratos
    environment:
      ORIGIN: ${ORIGIN:-http://localhost:8192}
      KRATOS_COOKIE_SECRET: ${KRATOS_COOKIE_SECRET:-changeme-32-chars-minimum-here}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SECRET: ${SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:4433/health/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  router:
    image: ghcr.io/sandialabs/sync-web/router:${SYNC_WEB_VERSION:-1.3.1}
    container_name: ${COMPOSE_PROJECT_NAME:-sync}-router
    environment:
      TLS_CERT_FILE: ${TLS_CERT_FILE:-/etc/nginx/certs/tls.crt}
      TLS_KEY_FILE: ${TLS_KEY_FILE:-/etc/nginx/certs/tls.key}
    volumes:
      - ${TLS_CERT_HOST_PATH:-./tls/tls.crt}:/etc/nginx/certs/tls.crt:ro,Z
      - ${TLS_KEY_HOST_PATH:-./tls/tls.key}:/etc/nginx/certs/tls.key:ro,Z
      - ${ACME_WEBROOT_HOST_PATH:-./acme-challenge}:/var/www/acme-challenge:Z
    depends_on:
      - journal
      - explorer
      - workbench
      - gateway
      - identity-provider
      - file-system
    networks:
      - sync-net
    ports:
      - "${HTTP_PORT:-8192}:80"
      - "${HTTPS_PORT:-8193}:443"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  file-system:
    image: ${FILE_SYSTEM_IMAGE:-ghcr.io/sandialabs/sync-web/file-system:1.3.1}
    container_name: ${COMPOSE_PROJECT_NAME:-sync}-file-system
    depends_on:
      - gateway
      - identity-provider
    networks:
      - sync-net
    environment:
      SYNC_FS_ADDRESS: :8080
      SYNC_FS_GATEWAY_BASE_URL: http://gateway/api/v1
      SYNC_FS_MAX_OBJECT_BYTES: ${SYNC_FS_MAX_OBJECT_BYTES:-1048576}
    healthcheck:
      test: ["CMD", "/file-system", "--healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  database:
  identity-provider-data:
