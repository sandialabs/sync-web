networks:
 docker:
    name: docker

services:
  journal:
    image: ghcr.io/sandialabs/sync-web/general:${SYNC_WEB_VERSION:-1.0.0}
    container_name: journal
    networks:
      - docker
    environment:
      SECRET: ${SECRET:-}
      PERIOD: ${PERIOD:-2}
      WINDOW: ${WINDOW:-1024}
      RUST_LOG: ${RUST_LOG:-INFO}
      JOURNAL_UPDATE: ${JOURNAL_UPDATE:-}
      INTERFACE_ADMINS: ${INTERFACE_ADMINS:-admin}
    volumes:
      - database:/srv/database

  explorer:
    image: ghcr.io/sandialabs/sync-web/explorer:${SYNC_WEB_VERSION:-1.0.0}
    container_name: explorer
    networks:
      - docker
    environment:
      SYNC_EXPLORER_ENDPOINT: /api/v1

  workbench:
    image: ghcr.io/sandialabs/sync-web/workbench:${SYNC_WEB_VERSION:-1.0.0}
    container_name: workbench
    networks:
      - docker
    environment:
      SYNC_WORKBENCH_ENDPOINT: /interface

  gateway:
    image: ghcr.io/sandialabs/sync-web/gateway:${SYNC_WEB_VERSION:-1.0.0}
    container_name: gateway
    networks:
      - docker
    depends_on:
      - journal
    environment:
      HOST: 0.0.0.0
      PORT: 80
      JOURNAL_JSON_ENDPOINT: http://journal/interface/json
      JOURNAL_SCHEME_ENDPOINT: http://journal/interface
      ROOT_JSON_ENDPOINT: http://journal/interface/json
      ROOT_SCHEME_ENDPOINT: http://journal/interface
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-30000}
      ALLOW_ADMIN_ROUTES: "1"
      JOURNAL_SECRET: ${SECRET:-}
      KRATOS_PUBLIC_URL: http://identity-provider:4433
      # Peer bridges should target the gateway interface proxy, not /interface directly:
      # bridge! name=<peer> interface=http://<peer-gateway>/api/v1/journal/interface

  identity-provider:
    image: ghcr.io/sandialabs/sync-web/identity-provider:${SYNC_WEB_VERSION:-1.0.0}
    container_name: identity-provider
    networks:
      - docker
    volumes:
      - identity-provider-data:/var/lib/kratos
    environment:
      DOMAIN: ${DOMAIN:-localhost:8192}
      KRATOS_COOKIE_SECRET: ${KRATOS_COOKIE_SECRET:-changeme-32-chars-minimum-here}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SECRET: ${SECRET:-}
    restart: unless-stopped

  router:
    image: ghcr.io/sandialabs/sync-web/router:${SYNC_WEB_VERSION:-1.0.0}
    container_name: router
    environment:
      TLS_CERT_FILE: ${TLS_CERT_FILE:-/etc/nginx/certs/tls.crt}
      TLS_KEY_FILE: ${TLS_KEY_FILE:-/etc/nginx/certs/tls.key}
    volumes:
      - ${TLS_CERT_HOST_PATH:-./tls/tls.crt}:/etc/nginx/certs/tls.crt:ro
      - ${TLS_KEY_HOST_PATH:-./tls/tls.key}:/etc/nginx/certs/tls.key:ro
      - ${ACME_WEBROOT_HOST_PATH:-./acme-challenge}:/var/www/acme-challenge
    depends_on:
      - journal
      - explorer
      - workbench
      - gateway
      - identity-provider
    networks:
      - docker
    ports:
      - "${PORT:-8192}:80"
      - "${HTTPS_PORT:-443}:443"

  file-system:
    image: ${FILE_SYSTEM_IMAGE:-ghcr.io/sandialabs/sync-web/file-system:1.0.0}
    container_name: file-system
    depends_on:
      - gateway
      - identity-provider
    networks:
      - docker
    environment:
      SYNC_FS_Mode: static-smb
      SYNC_FS_Backend: ${SYNC_FS_Backend:-http-journal-stage}
      SYNC_FS_Port: 445
      SYNC_FS_ShareName: sync
      SYNC_FS_AllowGuest: ${SYNC_FS_AllowGuest:-true}
      SYNC_FS_UserName: ${SYNC_FS_UserName:-}
      SYNC_FS_Password: ${SYNC_FS_Password:-}
      SYNC_FS_Secret: ${SECRET:-}
      SYNC_FS_GatewayTimeoutMs: ${SYNC_FS_GatewayTimeoutMs:-30000}
    ports:
      - "${SMB_PORT:-445}:445"

volumes:
  database:
  identity-provider-data:
