networks:
 docker:
    name: docker

services:
  journal:
    image: ghcr.io/sandialabs/sync-services/general:1.2.0
    container_name: journal
    networks:
      - docker
    environment:
      SECRET: ${SECRET}
      PERIOD: ${PERIOD:-2}
      WINDOW: ${WINDOW:-1024}
      RUST_LOG: ${RUST_LOG:-INFO}
    volumes:
      - database:/srv/database

  explorer:
    image: ghcr.io/sandialabs/sync-services/explorer:1.2.0
    container_name: explorer
    networks:
      - docker
    environment:
      SYNC_EXPLORER_ENDPOINT: /api/v1

  workbench:
    image: ghcr.io/sandialabs/sync-services/workbench:1.0.3
    container_name: workbench
    networks:
      - docker
    environment:
      SYNC_WORKBENCH_ENDPOINT: /interface

  gateway:
    image: ghcr.io/sandialabs/sync-services/gateway:1.1.0
    container_name: gateway
    networks:
      - docker
    depends_on:
      - journal
    environment:
      HOST: 0.0.0.0
      PORT: 80
      JOURNAL_JSON_ENDPOINT: http://journal/interface/json
      JOURNAL_LISP_ENDPOINT: http://journal/interface
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-30000}
      ALLOW_ADMIN_ROUTES: "1"

  router:
    image: ghcr.io/sandialabs/sync-services/router:1.2.0
    container_name: router
    environment:
      TLS_CERT_FILE: ${TLS_CERT_FILE:-/etc/nginx/certs/tls.crt}
      TLS_KEY_FILE: ${TLS_KEY_FILE:-/etc/nginx/certs/tls.key}
    volumes:
      - ${TLS_CERT_HOST_PATH:-./tls/tls.crt}:/etc/nginx/certs/tls.crt:ro
      - ${TLS_KEY_HOST_PATH:-./tls/tls.key}:/etc/nginx/certs/tls.key:ro
      - ${ACME_WEBROOT_HOST_PATH:-./acme-challenge}:/var/www/acme-challenge
    depends_on:
      - journal
      - explorer
      - workbench
      - gateway
    networks:
      - docker
    ports:
      - "${PORT:-8192}:80"
      - "${HTTPS_PORT:-443}:443"

  file-system:
    image: ${FILE_SYSTEM_IMAGE:-ghcr.io/sandialabs/sync-services/file-system:1.1.0}
    container_name: file-system
    depends_on:
      - journal
      - gateway
    networks:
      - docker
    environment:
      SYNC_FS_Mode: static-smb
      SYNC_FS_Backend: ${SYNC_FS_Backend:-http-journal-stage}
      SYNC_FS_Port: 445
      SYNC_FS_ShareName: sync
      SYNC_FS_AllowGuest: "true"
      SYNC_FS_GatewayBaseUrl: ${SYNC_FS_GatewayBaseUrl:-http://gateway/api/v1}
      SYNC_FS_JournalJsonUrl: ${SYNC_FS_JournalJsonUrl:-http://journal/interface/json}
      SYNC_FS_GatewayTimeoutMs: ${SYNC_FS_GatewayTimeoutMs:-30000}
      SYNC_FS_GatewayAuthToken: ${SECRET}
    ports:
      - "${SMB_PORT:-445}:445"

volumes:
  database:
