name: Social Agent

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: "social-agent"
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install social-agent test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ./docker/social-agent/requirements.txt
      - name: Run social-agent tests
        run: |
          python -m unittest discover -s ./docker/social-agent/tests -p "test_*.py" -v

  docker-validate:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build social-agent Docker image for amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/social-agent/Dockerfile
          push: false
          load: false
          platforms: linux/amd64

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions: write-all
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Login to Github registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Read social-agent version
        id: version
        run: |
          echo "value=$(cat ./firewheel/model-components/social-agent/version.txt)" >> "$GITHUB_OUTPUT"
      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/social-agent/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/social-agent:${{ steps.version.outputs.value }}
            ghcr.io/${{ github.repository }}/social-agent:latest
