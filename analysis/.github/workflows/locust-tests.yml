name: Locust Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: "locust-tests-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  locust-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r locust/requirements.txt

      - name: Run locust unit tests
        run: |
          python -m unittest discover -s locust/tests -p "test_*.py" -v
